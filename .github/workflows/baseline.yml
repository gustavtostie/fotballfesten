name: baseline-og-verifisering

# Engangs-hjelpeworkflow: genererer baseline_sitemap.txt fra live-siden,
# verifiserer at vakten ikke gir falske alarmer mot baseline, kjører en
# kort loop-test, committer baselinen til branchen og sender (valgfritt)
# et testvarsel til ntfy-topicet.

on:
  push:
    branches:
      - main
      - claude/fotballfesten-ticket-watch-8e8g9s
    paths-ignore:
      - baseline_sitemap.txt
  workflow_dispatch:
    inputs:
      ntfy_topic:
        description: "ntfy-topic for testvarsel (tomt = ikke send)"
        required: false
        default: ""
      alert_email:
        description: "e-post som også skal få testvarselet"
        required: false
        default: ""

permissions:
  contents: write
  issues: write

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests

      - name: Generer baseline fra live-siden
        run: |
          curl -s https://www.fotballfesten.no/sitemap.xml | grep -oP '(?<=<loc>)[^<]+' | sort > baseline_sitemap.txt
          echo "Antall URL-er: $(wc -l < baseline_sitemap.txt)"
          cat baseline_sitemap.txt
          grep -q '/frognerstadion' baseline_sitemap.txt || { echo "MANGLER /frognerstadion"; exit 1; }
          grep -q '/store' baseline_sitemap.txt || { echo "MANGLER /store"; exit 1; }
          test "$(wc -l < baseline_sitemap.txt)" -ge 20 || { echo "FOR FÅ URL-ER I SITEMAP"; exit 1; }

      - name: Dry-run - verifiser at baseline ikke gir falske alarmer
        run: |
          python - <<'EOF'
          import os
          os.environ['NTFY_TOPIC'] = 'dryrun'
          import watch
          alerts = []
          watch.notify = lambda k, t, m: alerts.append((t, m))
          watch.check_once()
          print('Varsler utløst:', len(alerts))
          assert len(alerts) == 0, f'FALSK ALARM VED BASELINE: {alerts}'
          print('OK - ingen falske alarmer, baseline stemmer')
          EOF

      - name: Kort loop-test (1 minutt)
        env:
          NTFY_TOPIC: dryrun
          RUN_MINUTES: "1"
        run: python watch.py

      - name: Commit baseline til branchen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baseline_sitemap.txt
          git diff --cached --quiet || git commit -m "Baseline: sitemap-URL-er fra fotballfesten.no"
          git push

      - name: Send testvarsel
        # Kjøres når workflowen trigges manuelt med topic-input, ELLER når
        # commit-meldingen inneholder [test] (da brukes repo-secrets).
        if: ${{ inputs.ntfy_topic != '' || contains(github.event.head_commit.message, '[test]') }}
        env:
          NTFY_TOPIC: ${{ inputs.ntfy_topic || secrets.NTFY_TOPIC }}
          ALERT_EMAIL: ${{ inputs.alert_email || secrets.ALERT_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "::error::NTFY_TOPIC er tom - secret er ikke satt i repoet ennå"
            exit 1
          fi
          # 1) Push (uten Email-header - ntfy.sh avviser alt hvis den er med)
          status=$(curl -s -o /tmp/push.json -w "%{http_code}" \
            -d "Vakten er aktiv og overvåker fotballfesten.no. Dette er en test." \
            -H "Title: ✅ Fotballfesten-vakt kjører" \
            "https://ntfy.sh/$NTFY_TOPIC")
          echo "ntfy push: HTTP $status"
          cat /tmp/push.json; echo
          test "$status" -lt 400
          # 2) E-post via ntfy - best effort, krever betalt ntfy-konto
          if [ -n "$ALERT_EMAIL" ]; then
            echo "ntfy e-postforsøk:"
            curl -s -d "Vakten er aktiv og overvåker fotballfesten.no. Dette er en test." \
              -H "Title: ✅ Fotballfesten-vakt kjører" \
              -H "Email: $ALERT_EMAIL" \
              "https://ntfy.sh/$NTFY_TOPIC" || true
            echo
          fi
          # 3) Test-issue - GitHub e-poster alle som watcher repoet
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/issues" \
            -d '{"title":"✅ Test: Fotballfesten-vakt kjører","body":"Dette er et testvarsel fra vakten. Alle som *watcher* dette repoet får e-post fra GitHub når vakten oppretter et issue ved billettslipp. Lukk gjerne dette issuet."}' \
            | grep -o '"html_url": *"[^"]*issues/[0-9]*"' | head -1
