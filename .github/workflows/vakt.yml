name: fotballfesten-vakt

on:
  schedule:
    - cron: "*/15 * * * *"
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: vakt
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    # GitHub-cron er upålitelig (observert 3+ timers hull mellom fyringer).
    # Lange runder gjør at én kjøring dekker hullene; concurrency-køen
    # sørger for at neste runde tar over sømløst.
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Overvåk fotballfesten.no
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_MINUTES: "340"
        run: python watch.py
