name: fotballfesten-vakt

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: vakt
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Overvåk fotballfesten.no
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          RUN_MINUTES: "25"
        run: python watch.py
